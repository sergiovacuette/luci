<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encoding Task — Digital Tourism</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --border: #e0ddd6;
    --text-primary: #1a1916; --text-secondary: #6b6860; --text-hint: #a8a49d;
    --red: #e74c3c; --green: #27ae60; --blue: #2980b9;
    --radius: 6px;
    --card-w: min(calc((100vw - 120px) / 6), calc((100vh - 180px) / 3));
    --card-h: calc(var(--card-w) * 0.75);
    /* Overlay image size — same as T1/T2 stimulus */
    --stim-w: min(calc(100vw - 80px), calc((100vh - 200px) * 4 / 3));
    --stim-h: min(calc((100vw - 80px) * 3 / 4), calc(100vh - 200px));
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text-primary);
    min-height: 100vh; user-select: none;
  }

  /* ── PROGRESS OVERLAY ── */
  .progress-overlay {
    position: fixed; top: 12px; right: 16px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--text-hint); background: var(--surface);
    padding: 4px 10px; border-radius: 20px;
    border: 0.5px solid var(--border); z-index: 200;
  }

  /* ── GRELHA ── */
  #viewGrid {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 20px;
  }
  .grid-container {
    display: grid; grid-template-columns: repeat(6, var(--card-w));
    gap: clamp(6px, 0.8vw, 12px);
  }

  /* ── CARDS ── */
  .card {
    width: var(--card-w); height: var(--card-h);
    border-radius: var(--radius); cursor: pointer;
    position: relative; overflow: hidden;
    transition: transform .12s ease;
    background: var(--surface);
  }
  .card.red   { border: 8px solid var(--red); }
  .card.green { border: 8px solid var(--green); }
  .card.blue  { border: 8px solid var(--blue); }
  .card:not(.done):not(.locked):hover { transform: translateY(-2px); }
  .card.locked { cursor: default; }

  /* Colour dot */
  /*.card::before {
    content: ''; position: absolute; top: 6px; left: 6px;
    width: 9px; height: 9px; border-radius: 2px; z-index: 3;
  }
  .card.red::before   { background: var(--red); }
  .card.green::before { background: var(--green); }
  .card.blue::before  { background: var(--blue); }*/

  /* Image inside card — always visible */
  .card-img {
    width: 100%; height: 100%; object-fit: cover;
    display: block; position: absolute; inset: 0;
  }

  /* Done tick — small checkmark in bottom-right corner */
  .card-done-overlay {
    display: none; position: absolute;
    /*bottom: 6px; right: 6px;*/
    top: 6px; right: 6px;
    width: 22px; height: 22px; z-index: 4;
    align-items: center; justify-content: center;
  }
  .card.done .card-done-overlay { display: flex; }
  .card-done-overlay svg {
    width: 22px; height: 22px;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
  }

  /* ── IMAGE OVERLAY (zoom) ── */
  #imgOverlay {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.6);
    align-items: center; justify-content: center;
  }
  #imgOverlay.show { display: flex; }
  #imgOverlayWrap {
    width: var(--stim-w); height: var(--stim-h);
    border-radius: 10px; overflow: hidden;
    border: 8px solid transparent;
    animation: zoomIn .2s ease;
  }
  #imgOverlayWrap.red   { border-color: var(--red); }
  #imgOverlayWrap.green { border-color: var(--green); }
  #imgOverlayWrap.blue  { border-color: var(--blue); }
  #imgOverlayImg {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  @keyframes zoomIn {
    from { transform: scale(0.75); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  /* ── AGENCY ── */
  #viewAgency {
    display: none; min-height: 100vh;
    flex-direction: column; align-items: center; justify-content: center;
    padding: 48px 24px; background: var(--bg);
  }
  #viewAgency.show { display: flex; }
  .agency-wrap {
    width: 100%; max-width: 560px;
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 12px; padding: 40px 40px 36px;
  }
  .agency-counter { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-hint); margin-bottom: 24px; text-align: center; }
  .agency-question { font-size: 17px; font-weight: 400; color: var(--text-primary); text-align: center; line-height: 1.5; margin-bottom: 32px; }
  .scale-row { display: flex; }
  .scale-btn {
    flex: 1; height: 52px; border: 0.5px solid var(--border);
    background: var(--surface); font-family: 'DM Mono', monospace;
    font-size: 15px; color: var(--text-secondary); cursor: pointer;
    transition: background .1s, color .1s;
  }
  .scale-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
  .scale-btn:last-child  { border-radius: 0 var(--radius) var(--radius) 0; }
  .scale-btn:not(:first-child) { border-left: none; }
  .scale-btn:hover { background: #f0ede8; color: var(--text-primary); }
  .scale-btn.selected { background: var(--text-primary); color: #fff; border-color: var(--text-primary); font-weight: 500; }
  .scale-labels { display: flex; justify-content: space-between; margin-top: 10px; font-size: 11px; color: var(--text-hint); padding: 0 2px; }

  /* ── END ── */
  #viewEnd { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 16px; padding: 48px; }
  #viewEnd.show { display: flex; }
  .end-title { font-size: 24px; font-weight: 300; }
  .end-subtitle { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
</style>
</head>
<body>

<div class="progress-overlay"><span id="progressLabel">0 / 18</span></div>

<div id="viewGrid">
  <div class="grid-container" id="grid"></div>
</div>

<!-- Image zoom overlay -->
<div id="imgOverlay">
  <div id="imgOverlayWrap">
    <img id="imgOverlayImg" src="" alt="">
  </div>
</div>

<div id="viewAgency">
  <div class="agency-wrap">
    <div class="agency-counter" id="agencyCounter">Imagem 1 de 18</div>
    <div class="agency-question">Até que ponto sentiu que teve controlo sobre a ação que acabou de realizar?</div>
    <div class="scale-row" id="scaleRow">
      <button class="scale-btn" onclick="submitAgency(1)">1</button>
      <button class="scale-btn" onclick="submitAgency(2)">2</button>
      <button class="scale-btn" onclick="submitAgency(3)">3</button>
      <button class="scale-btn" onclick="submitAgency(4)">4</button>
      <button class="scale-btn" onclick="submitAgency(5)">5</button>
      <button class="scale-btn" onclick="submitAgency(6)">6</button>
      <button class="scale-btn" onclick="submitAgency(7)">7</button>
      <button class="scale-btn" onclick="submitAgency(8)">8</button>
      <button class="scale-btn" onclick="submitAgency(9)">9</button>
      <button class="scale-btn" onclick="submitAgency(10)">10</button>
    </div>
    <div class="scale-labels">
      <span>Nenhum controlo</span>
      <span>Controlo moderado</span>
      <span>Controlo total</span>
    </div>
  </div>
</div>

<div id="viewEnd">
  <div class="end-title">Tarefa concluída</div>
  <div class="end-subtitle">Visualizou todas as imagens.<br>Pode fechar esta janela.</div>
</div>

<script>
const AGENCY_PATTERN = [
  'high','low','high','low','high','low',
  'low','high','low','high','low','high',
  'high','low','high','low','high','low'
];

const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwvQ-1Zfyr4uTaCAjhJ_si9qIvGnjbVxIlOdJUbB7G1JGKxvmokuWKy5_CtGG5S7c-9/exec';
const PARTICIPANT_ID = 'P_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);

function sendToSheet(row) {
  const params = new URLSearchParams({
    timestamp:      row.ts_click,
    participant_id: PARTICIPANT_ID,
    card_id:        row.cardId,
    position_row:   row.position_row,
    position_col:   row.position_col,
    colour:         row.colour,
    category:       row.category,
    condition:      row.condition,
    delay_ms:       row.delay_ms,
    agency_rating:  row.agency_rating,
    rt_ms:          row.ts_response - row.ts_click
  });
  const img = new Image();
  img.src = SHEET_URL + '?' + params.toString();
}

const CONFIG = {
  lowDelayMin: 800,
  lowDelayMax: 1000,
  zoomDuration: 2000, // 2 segundo de overlay
  images: [
    { id:  1, src: 'https://sergiovacuette.github.io/luci/images/Nature/Encoding/Animals_100_h.jpg',       colour: 'green', category: 'nature',     position: 0  },
    { id:  2, src: 'https://sergiovacuette.github.io/luci/images/Events/Encoding/Faces_050_h.jpg',         colour: 'red',   category: 'events',     position: 1  },
    { id:  3, src: 'https://sergiovacuette.github.io/luci/images/Gastronomy/Encoding/Objects_016_h.jpg',   colour: 'green', category: 'gastronomy', position: 2  },
    { id:  4, src: 'https://sergiovacuette.github.io/luci/images/Gastronomy/Encoding/Objects_048_h.jpg',   colour: 'blue',  category: 'gastronomy', position: 3  },
    { id:  5, src: 'https://sergiovacuette.github.io/luci/images/Nature/Encoding/Landscapes_021_h.jpg',    colour: 'red',   category: 'nature',     position: 4  },
    { id:  6, src: 'https://sergiovacuette.github.io/luci/images/Events/Encoding/Faces_234_h.jpg',         colour: 'green', category: 'events',     position: 5  },
    { id:  7, src: 'https://sergiovacuette.github.io/luci/images/Nature/Encoding/Landscapes_102_h.jpg',    colour: 'blue',  category: 'nature',     position: 6  },
    { id:  8, src: 'https://sergiovacuette.github.io/luci/images/Nature/Encoding/Landscapes_157_h.jpg',    colour: 'green', category: 'nature',     position: 7  },
    { id:  9, src: 'https://sergiovacuette.github.io/luci/images/Events/Encoding/Faces_286_h.jpg',         colour: 'blue',  category: 'events',     position: 8  },
    { id: 10, src: 'https://sergiovacuette.github.io/luci/images/Events/Encoding/People_046_h.jpg',        colour: 'blue',  category: 'events',     position: 9  },
    { id: 11, src: 'https://sergiovacuette.github.io/luci/images/Nature/Encoding/Landscapes_173_h.jpg',    colour: 'blue',  category: 'nature',     position: 10 },
    { id: 12, src: 'https://sergiovacuette.github.io/luci/images/Gastronomy/Encoding/Objects_051_h.jpg',   colour: 'green', category: 'gastronomy', position: 11 },
    { id: 13, src: 'https://sergiovacuette.github.io/luci/images/Events/Encoding/People_175_h.jpg',        colour: 'green', category: 'events',     position: 12 },
    { id: 14, src: 'https://sergiovacuette.github.io/luci/images/Gastronomy/Encoding/Objects_062_h.jpg',   colour: 'blue',  category: 'gastronomy', position: 13 },
    { id: 15, src: 'https://sergiovacuette.github.io/luci/images/Nature/Encoding/Landscapes_180_h.jpg',    colour: 'red',   category: 'nature',     position: 14 },
    { id: 16, src: 'https://sergiovacuette.github.io/luci/images/Gastronomy/Encoding/Objects_082_h.jpg',   colour: 'red',   category: 'gastronomy', position: 15 },
    { id: 17, src: 'https://sergiovacuette.github.io/luci/images/Gastronomy/Encoding/People_067_h.jpg',    colour: 'red',   category: 'gastronomy', position: 16 },
    { id: 18, src: 'https://sergiovacuette.github.io/luci/images/Events/Encoding/People_185_h.jpg',        colour: 'red',   category: 'events',     position: 17 }
  ]
};

const state = { done: [], waiting: false, responses: [], pendingMeta: null };

function buildGrid() {
  const grid = document.getElementById('grid');
  [...CONFIG.images].sort((a,b) => a.position - b.position).forEach(img => {
    const card = document.createElement('div');
    card.className = `card ${img.colour}`;
    card.id = `card-${img.id}`;

    // Image always visible
    const im = document.createElement('img');
    im.className = 'card-img';
    im.src = img.src;
    im.alt = '';
    card.appendChild(im);

    // Done tick overlay
    const doneOverlay = document.createElement('div');
    doneOverlay.className = 'card-done-overlay';
    doneOverlay.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    card.appendChild(doneOverlay);

    card.addEventListener('click', () => onCardClick(img));
    grid.appendChild(card);
  });
}

function onCardClick(img) {
  if (state.waiting || state.done.includes(img.id)) return;
  state.waiting = true;
  const tsClick = Date.now();

  // Lock all cards
  document.querySelectorAll('.card').forEach(c => c.classList.add('locked'));

  const condition = AGENCY_PATTERN[img.position];
  const delay = condition === 'low'
    ? Math.floor(Math.random() * (CONFIG.lowDelayMax - CONFIG.lowDelayMin + 1)) + CONFIG.lowDelayMin
    : 0;

  state.pendingMeta = { img, condition, delay, tsClick };

  // After delay → show zoom overlay for 1 second
  setTimeout(() => {
    showZoomOverlay(img);
    setTimeout(() => {
      hideZoomOverlay();
      showAgency();
    }, CONFIG.zoomDuration);
  }, delay);
}

function showZoomOverlay(img) {
  const wrap = document.getElementById('imgOverlayWrap');
  wrap.className = img.colour; // applies border colour
  document.getElementById('imgOverlayImg').src = img.src;
  document.getElementById('imgOverlay').classList.add('show');
}

function hideZoomOverlay() {
  document.getElementById('imgOverlay').classList.remove('show');
  document.getElementById('imgOverlayImg').src = '';
}

function showAgency() {
  document.getElementById('viewGrid').style.display = 'none';
  document.getElementById('agencyCounter').textContent =
    `Imagem ${state.done.length + 1} de 18`;
  document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('viewAgency').classList.add('show');
}

function submitAgency(rating) {
  const { img, condition, delay, tsClick } = state.pendingMeta;

  document.querySelectorAll('.scale-btn')[rating-1].classList.add('selected');

  const row = {
    cardId:        img.id,
    position_row:  Math.floor(img.position / 6) + 1,
    position_col:  (img.position % 6) + 1,
    colour:        img.colour,
    category:      img.category,
    condition:     condition,
    delay_ms:      delay,
    agency_rating: rating,
    ts_click:      tsClick,
    ts_response:   Date.now()
  };
  state.responses.push(row);
  sendToSheet(row);
  state.done.push(img.id);
  state.waiting = false;

  // ITI 500ms → back to grid
  setTimeout(() => {
    document.getElementById('viewAgency').classList.remove('show');
    document.getElementById('viewGrid').style.display = 'flex';

    // Mark card as done with tick
    document.getElementById(`card-${img.id}`).classList.add('done');
    document.querySelectorAll('.card:not(.done)').forEach(c => c.classList.remove('locked'));

    updateProgress();

    if (state.done.length === CONFIG.images.length) {
      setTimeout(() => showEnd(), 300);
    }
  }, 500);
}

function updateProgress() {
  document.getElementById('progressLabel').textContent =
    `${state.done.length} / ${CONFIG.images.length}`;
}

function showEnd() {
  document.getElementById('viewGrid').style.display = 'none';
  document.getElementById('viewEnd').classList.add('show');
  try { sessionStorage.setItem('encoding_responses', JSON.stringify(state.responses)); } catch(e) {}
}

function advanceStudy() {
  try {
    if (window.iMotionsWebStudy?.endStimulus) window.iMotionsWebStudy.endStimulus();
    else if (window.parent?.iMotions?.endStimulus) window.parent.iMotions.endStimulus();
    else window.parent?.postMessage('stimulus_complete', '*');
  } catch(e) {}
}

buildGrid();
</script>
</body>
</html>
